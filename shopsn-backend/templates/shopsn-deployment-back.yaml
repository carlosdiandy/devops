apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopsn-back-deploy
  labels:
    app: shopsn-back-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shopsn-back-deploy
  template:
    metadata:
      name: shopsn-back-deploy
      labels:
        app: shopsn-back-deploy
    spec:
      imagePullSecrets:
        - name: nexus-creds
      containers:
        - name: shopsn-back-deploy
          image: host.minikube.internal:8082/backend.shop.sn:3.3.3
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://host.minikube.internal:5432/shop_db_prod"
            - name: SHOP_APP_FRONTEND_URL
              value: "https://shopsn.127.0.0.1.nip.io"
            - name: MINIO_URL
              value: "http://docker-minio-service:9000"
            - name: SERVER_FORWARD_HEADERS_STRATEGY
              value: "framework"
            - name: SERVER_SERVLET_SESSION_COOKIE_SECURE
              value: "true"
            - name: SERVER_SERVLET_SESSION_COOKIE_SAME_SITE
              value: "None"
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  key: client_id
                  name: shopsn-g-oauth-secret
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: client_secret
                  name: shopsn-g-oauth-secret
            - name: SPRING_MAIL_HOST
              value: "mail.etamcorp.site"
            - name: SPRING_MAIL_PORT
              value: "587"
            - name: SPRING_MAIL_USERNAME
              value: "shopsn@etamcorp.site"
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: spring_mail_password
                  name: spring-mail-secret
          ports:
            - containerPort: 8099
              protocol: TCP
      restartPolicy: Always
